<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon premier site Bootstrap</title>

  <!-- Lien vers le CSS de Bootstrap via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Ton propre CSS (toujours après Bootstrap pour écraser les styles si besoin) -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container text-center mt-5">
    <h1 class="text-primary">Bienvenue sur mon premier site Bootstrap</h1>
    <p class="lead">Ce texte est stylisé automatiquement par Bootstrap.</p>
    <button class="btn btn-success">Découvrir</button>
  </div>

  <!-- Script Bootstrap (bundle avec Popper intégré) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Ton propre JS -->
  <script src="js/script.js"></script>
</body>
</html>
